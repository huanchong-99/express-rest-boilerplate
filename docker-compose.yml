version: "2"
services:
  boilerplate-api:
    build: .
    environment:
      - RUST_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/express_rest_boilerplate
      - JWT_SECRET=local-dev-only-not-for-production
      - JWT_EXPIRATION_MINUTES=15
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: express_rest_boilerplate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
